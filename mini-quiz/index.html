<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Challenge</title>
    <link rel="icon" type="image/png" href="kucing.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<video autoplay muted loop id="bg-video">
  <source src="bgvid.mp4" type="video/mp4">
</video>


<div class="container">

    <!-- START SCREEN -->

    <div class="card" id="startScreen">

        <h1>Quiz Challenge</h1>

        <p class="subtitle">
            Test your knowledge with 10 random questions.
        </p>

        <div class="input-group">

            <label>Your Name</label>

            <input
                type="text"
                id="playerName"
                placeholder="Enter your name">

        </div>
        

        <button id="startBtn">
            Start Quiz
        </button>

        <div class="highscore">
            🏆 High Score :
            <span id="highScore">0</span>
        </div>

    </div>



    <!-- QUIZ SCREEN -->

    <div class="card hidden" id="quizScreen">

        <div class="top-bar">

            <span id="questionNumber">
                Question 1 / 10
            </span>

            <div class="timer">

                <span id="timer">
                    15
                </span>

            </div>

        </div>

        <div class="progress">

            <div
                class="progress-bar"
                id="progressBar">
            </div>

        </div>

        <h2 id="questionText">

            Question

        </h2>

        <div
            class="answers"
            id="answers">

        </div>

        <button id="nextBtn">

            Next

        </button>

    </div>



    <!-- RESULT SCREEN -->

    <div
        class="card hidden"
        id="resultScreen">

        <h1>

            Quiz Finished!

        </h1>

        <h2 id="finalScore">

            0

        </h2>

        <p id="grade">

            Grade

        </p>

        <div class="stats">

            <div>

                <h3 id="correct">

                    0

                </h3>

                <span>

                    Correct

                </span>

            </div>

            <div>

                <h3 id="wrong">

                    0

                </h3>

                <span>

                    Wrong

                </span>

            </div>

            <div>

                <h3 id="accuracy">

                    0%

                </h3>

                <span>

                    Accuracy

                </span>

            </div>

        </div>

        <button id="restartBtn">

            Play Again

        </button>

    </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
